name: release
run-name: "release ${{ inputs.bump || github.ref_name }}"

# Channel = branch. Push to `stable` for a real semver release; push to `beta`
# for a prerelease. Or run manually and pick a bump.
on:
  push:
    branches: [stable, beta]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (stable only)"
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: "Override version (optional, e.g. 1.2.3)"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Resolve channel + version from the branch / inputs ──────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      channel: ${{ steps.v.outputs.channel }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need all tags to compute the next version
      - id: v
        run: bash scripts/release-version.sh
        env:
          HIKER_BUMP: ${{ inputs.bump }}
          HIKER_VERSION: ${{ inputs.version }}

  # ── Cross-compile the `hiker` binary for every target ───────────────────────
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: macos-14,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Stamp the resolved version into the crate so `hiker --version` reports it.
      - name: Stamp version
        shell: bash
        run: |
          v="${{ needs.version.outputs.version }}"
          perl -0pi -e "s/^version = \"[^\"]+\"/version = \"$v\"/m" crates/hiker/Cargo.toml
          grep '^version' crates/hiker/Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux cross targets (aarch64, musl) need a cross toolchain; this action
      # configures cargo so a plain `cargo build --target` just works.
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: runner.os == 'Linux'
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p hiker --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dist="hiker-${{ matrix.target }}"
          tar -czf "$dist.tar.gz" -C "target/${{ matrix.target }}/release" hiker
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "hiker-${{ matrix.target }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/hiker.exe" -DestinationPath "$dist.zip" -Force
          (Get-FileHash "$dist.zip" -Algorithm SHA256).Hash.ToLower() + "  $dist.zip" | Out-File "$dist.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: hiker-${{ matrix.target }}
          path: |
            hiker-${{ matrix.target }}.tar.gz*
            hiker-${{ matrix.target }}.zip*

  # ── Publish the GitHub Release (prerelease=true for beta) ────────────────────
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          fail_on_unmatched_files: true

  # ── Publish the crate to crates.io (stable only, after the GitHub Release) ───
  # Strict sequence: runs only once `release` succeeds, and only for stable
  # versions (prereleases stay GitHub-Releases-only). Re-runs are safe: the
  # version is skipped if it already exists on the crates.io index.
  publish-crate:
    needs: [version, release]
    if: needs.version.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stamp the resolved version into the crate before publishing (same as
      # the build job). This makes the tree dirty, hence --allow-dirty below.
      - name: Stamp version
        shell: bash
        run: |
          v="${{ needs.version.outputs.version }}"
          perl -0pi -e "s/^version = \"[^\"]+\"/version = \"$v\"/m" crates/hiker/Cargo.toml
          grep '^version' crates/hiker/Cargo.toml

      - uses: dtolnay/rust-toolchain@stable

      # Skip gracefully if this version is already on crates.io (re-run safety).
      - name: Check crates.io index
        id: check
        shell: bash
        run: |
          v="${{ needs.version.outputs.version }}"
          if curl -sf -H 'User-Agent: hiker-release' "https://crates.io/api/v1/crates/hiker/$v" >/dev/null 2>&1; then
            echo "hiker $v already on crates.io — skipping publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.check.outputs.publish == 'true'
        run: cargo publish -p hiker --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
